<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generar íconos</title>
<style>body{background:#111;color:#fff;font-family:sans-serif;padding:2rem;text-align:center}
button{background:#FF6B35;color:#fff;border:none;padding:.8rem 2rem;border-radius:8px;font-size:1rem;cursor:pointer;margin:.5rem}
a{color:#FF6B35}</style>
</head>
<body>
<h2>Generador de íconos PNG</h2>
<p>Hacé click para generar y descargar los íconos necesarios</p>
<canvas id="c" style="display:none"></canvas>
<br>
<button onclick="generate(192)">Descargar icon-192.png</button>
<button onclick="generate(512)">Descargar icon-512.png</button>
<p style="color:#999;margin-top:1rem;font-size:.85rem">
  Guardá los archivos descargados en la carpeta <code>icons/</code> del proyecto
</p>
<script>
function generate(size) {
  const c = document.getElementById('c');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.195; // corner radius

  // Background with rounded corners
  ctx.fillStyle = '#0d0d0d';
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r);
  ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath(); ctx.fill();

  const s = size / 512;

  // Bar
  ctx.fillStyle = '#FF6B35';
  roundRect(ctx, 60*s, 236*s, 392*s, 40*s, 8*s);

  // Right plates outer
  ctx.fillStyle = '#FF6B35';
  roundRect(ctx, 48*s, 168*s, 52*s, 176*s, 14*s);

  // Left plates inner
  ctx.fillStyle = '#FF9F1C';
  roundRect(ctx, 20*s, 196*s, 44*s, 120*s, 14*s);

  // Right plates outer
  ctx.fillStyle = '#FF6B35';
  roundRect(ctx, 412*s, 168*s, 52*s, 176*s, 14*s);

  // Right plates inner
  ctx.fillStyle = '#FF9F1C';
  roundRect(ctx, 448*s, 196*s, 44*s, 120*s, 14*s);

  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath(); ctx.fill();
}
</script>
</body>
</html>
